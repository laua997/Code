<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Journal</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Firebase SDKs (Compatibility Version) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>
<body class="logged-out">

    <header>
        <div class="header-left">
            <input type="date" id="datePicker">
            <span id="status">Connecting...</span>
        </div>

        <div class="header-right">
            <div id="loggedOutUI">
                <button class="btn-secondary" id="openLogin">Log In</button>
                <button class="btn-primary" id="openSignup">Sign Up</button>
            </div>
            <div id="loggedInUI" class="hidden">
                <span id="userEmail"></span>
                <button class="btn-secondary" id="logoutBtn">Log Out</button>
            </div>
        </div>
    </header>

    <main id="mainApp">
        <section class="column weekly-column">
            <div class="day-box"><label>Monday</label><textarea data-day="monday"></textarea></div>
            <div class="day-box"><label>Tuesday</label><textarea data-day="tuesday"></textarea></div>
            <div class="day-box"><label>Wednesday</label><textarea data-day="wednesday"></textarea></div>
            <div class="day-box"><label>Thursday</label><textarea data-day="thursday"></textarea></div>
            <div class="day-box"><label>Friday</label><textarea data-day="friday"></textarea></div>
            <div class="day-box"><label>Saturday</label><textarea data-day="saturday"></textarea></div>
            <div class="day-box"><label>Sunday</label><textarea data-day="sunday"></textarea></div>
        </section>

        <section class="column notes-column">
            <label>Weekly Notes</label>
            <textarea id="generalNotes" placeholder="Type notes here..."></textarea>
        </section>
    </main>

    <div id="authModal" class="modal-overlay hidden">
        <div class="modal-card">
            <h2 id="modalTitle">Welcome</h2>
            <button id="googleBtn" class="btn-google">
                <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="18">
                Continue with Google
            </button>
            <div class="divider"><span>or</span></div>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">
            <button id="authSubmitBtn" class="btn-primary" style="width:100%">Continue</button>
            <button id="closeModal" class="btn-text">Cancel</button>
            <p id="authError" style="color:red; font-size:12px; margin-top:10px;"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
